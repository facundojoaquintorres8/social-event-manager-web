<div
  class="rounded-xl border border-gray-200 bg-white p-8 text-center dark:border-gray-800 dark:bg-gray-900"
>
  <div
    class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-blue-100 dark:bg-blue-900/20"
  >
    <ng-content select="[icon]"></ng-content>
  </div>

  <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
    {{ title() }}
  </h3>

  <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
    {{ description() }}
  </p>

  <div class="mt-5">
    <ng-content select="[actions]"></ng-content>
  </div>
</div>
