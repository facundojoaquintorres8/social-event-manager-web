<header
  class="border-b border-gray-200 bg-white transition-colors duration-300 dark:border-gray-800 dark:bg-gray-900"
>
  <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-3">
    <a
      routerLink="/dashboard"
      class="text-lg font-semibold text-gray-900 transition-colors hover:text-blue-600 dark:text-gray-100"
    >
      Social Event Manager
    </a>
    <nav class="flex items-center gap-4">
      <a
        routerLink="/events"
        class="text-sm text-gray-600 transition-colors hover:text-gray-900 dark:text-gray-400 dark:hover:text-gray-100"
      >
        Events
      </a>

      <button
        title="Toggle theme"
        (click)="themeService.toggleTheme()"
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white shadow-sm transition-all duration-200 hover:bg-gray-100 active:scale-95 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-gray-800"
      >
        <lucide-icon
          [img]="themeService.darkMode() ? Sun : Moon"
          class="h-5 w-5 text-gray-700 dark:text-gray-200"
        >
        </lucide-icon>
      </button>

      <button
        title="Logout"
        (click)="logout()"
        class="flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white shadow-sm transition-all duration-200 hover:bg-red-50 active:scale-95 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-red-900/20"
      >
        <lucide-icon [img]="LogOut" class="h-5 w-5 text-gray-700 dark:text-gray-200"> </lucide-icon>
      </button>
    </nav>
  </div>
</header>
