<header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">

    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">

        <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
            Social Event Manager
        </h2>

        <nav class="flex items-center gap-4">

            <a routerLink="/events" class="text-sm text-gray-600 dark:text-gray-400
               hover:text-gray-900 dark:hover:text-gray-100
               transition-colors">
                Events
            </a>

            <button class="text-sm text-red-500 dark:text-red-400
               hover:text-red-600 dark:hover:text-red-300
               transition-colors" (click)="logout()">
                Logout
            </button>

        </nav>

    </div>

</header>
