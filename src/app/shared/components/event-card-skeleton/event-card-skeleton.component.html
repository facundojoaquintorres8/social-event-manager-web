<div class="grid gap-4">
  @for (item of items(); track item) {
    <div
      class="animate-pulse rounded-xl border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-800 dark:bg-gray-900"
    >
      <div class="flex items-start justify-between gap-4">
        <div class="flex-1 space-y-2">
          <div class="h-4 w-1/3 rounded bg-gray-200 dark:bg-gray-800"></div>
          <div class="h-3 w-1/4 rounded bg-gray-200 dark:bg-gray-800"></div>
          <div class="h-3 w-2/5 rounded bg-gray-200 dark:bg-gray-800"></div>
        </div>

        <div class="flex items-center gap-2">
          <div class="h-5 w-16 rounded-full bg-gray-200 dark:bg-gray-800"></div>

          @if (variant() === 'invitations') {
            <div class="h-7 w-16 rounded-xl bg-gray-200 dark:bg-gray-800"></div>
            <div class="h-7 w-16 rounded-xl bg-gray-200 dark:bg-gray-800"></div>
          }

          <div class="h-4 w-4 rounded bg-gray-200 dark:bg-gray-800"></div>
        </div>
      </div>
    </div>
  }
</div>
