<div
  class="rounded-xl border border-red-200 bg-white p-8 text-center dark:border-red-900 dark:bg-gray-900"
>
  <div class="flex flex-col items-center justify-center py-4">
    <div
      class="mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400"
    >
      <svg lucideTriangleAlert [size]="28"></svg>
    </div>

    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
      {{ title() ?? 'common.errorTitle' | translate }}
    </h3>

    <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
      {{ description() ?? 'common.errorDescription' | translate }}
    </p>

    <button
      (click)="retry.emit()"
      class="mt-5 rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700"
    >
      {{ 'common.retry' | translate }}
    </button>
  </div>
</div>
