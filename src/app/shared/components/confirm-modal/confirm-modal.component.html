@if (open()) {
<div class="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50">

    <div class="w-full max-w-sm p-6 space-y-4 rounded-2xl shadow-xl border
               bg-white dark:bg-gray-900
               border-gray-200 dark:border-gray-800
               transition-colors duration-300">

        <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
            {{ title() }}
        </h3>

        <p class="text-sm text-gray-600 dark:text-gray-400">
            {{ message() }}
        </p>

        <div class="flex justify-end gap-2 pt-2">

            <button (click)="cancel.emit()" class="px-3 py-1 text-sm rounded-md transition-colors
                   text-gray-600 dark:text-gray-300
                   hover:bg-gray-100 dark:hover:bg-gray-800">
                Cancel
            </button>

            <button (click)="confirm.emit()" class="px-3 py-1 text-sm rounded-md transition-colors
                   bg-red-600 hover:bg-red-700 text-white">
                Confirm
            </button>

        </div>

    </div>

</div>
}
