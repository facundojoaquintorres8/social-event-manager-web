<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 backdrop-blur-sm">
  <div
    class="w-full max-w-sm space-y-4 rounded-2xl border border-gray-200 bg-white p-6 shadow-xl transition-colors duration-300 dark:border-gray-800 dark:bg-gray-900"
  >
    <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
      {{ title() ?? 'common.confirmTitle' | translate }}
    </h3>

    <p class="text-sm text-gray-600 dark:text-gray-400">
      {{ message() ?? 'common.confirmMessage' | translate }}
    </p>

    <div class="flex justify-end gap-2 pt-2">
      <button
        (click)="closeModal.emit()"
        class="rounded-md px-3 py-1 text-sm text-gray-600 transition-all duration-200 hover:bg-gray-100 active:scale-95 dark:text-gray-300 dark:hover:bg-gray-800"
      >
        {{ 'common.cancel' | translate }}
      </button>
      <button
        (click)="confirm.emit()"
        [disabled]="confirmDisabled()"
        class="rounded-md bg-red-600 px-3 py-1 text-sm text-white transition-all duration-200 hover:bg-red-700 active:scale-95 disabled:cursor-not-allowed disabled:opacity-50 disabled:hover:bg-red-600"
      >
        {{ 'common.confirm' | translate }}
      </button>
    </div>
  </div>
</div>
