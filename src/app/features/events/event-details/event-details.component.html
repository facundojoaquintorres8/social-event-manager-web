<div class="mx-auto max-w-4xl space-y-6">
  @if (loading()) {
    <div
      class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-gray-900"
    >
      <div class="animate-pulse space-y-4">
        <div class="h-8 w-1/3 rounded bg-gray-200 dark:bg-gray-700"></div>

        <div class="h-4 w-1/2 rounded bg-gray-200 dark:bg-gray-700"></div>

        <div class="h-32 rounded bg-gray-200 dark:bg-gray-700"></div>
      </div>
    </div>
  } @else if (error()) {
    <div class="rounded-xl bg-red-100 px-4 py-3 text-sm text-red-700">
      {{ error() }}
    </div>
  } @else if (event(); as event) {
    <div
      class="rounded-2xl border border-gray-200 bg-white p-6 shadow-sm dark:border-gray-800 dark:bg-gray-900"
    >
      <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
        <div>
          <div class="flex items-center gap-3">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-gray-100">
              {{ event.title }}
            </h1>

            <span
              class="rounded-full px-2 py-1 text-xs font-medium"
              [ngClass]="{
                'bg-green-100 text-green-700': event.status === EventStatus.ACTIVE,

                'bg-red-100 text-red-700': event.status === EventStatus.CANCELLED,
              }"
            >
              {{ event.status }}
            </span>
          </div>

          <p class="mt-3 text-sm text-gray-500 dark:text-gray-400">
            {{ event.description }}
          </p>
        </div>

        <div class="flex flex-wrap items-center gap-3">
          <button
            [routerLink]="['/events/edit', event.id]"
            class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-all duration-200 hover:bg-blue-700 active:scale-95"
          >
            Edit Event
          </button>

          <button
            (click)="inviteModalOpen.set(true)"
            class="rounded-xl border border-gray-200 bg-white px-4 py-2 text-sm font-medium text-gray-700 transition-all duration-200 hover:bg-gray-100 active:scale-95 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-200 dark:hover:bg-gray-800"
          >
            Invite User
          </button>
        </div>
      </div>
    </div>

    <div class="grid gap-4 md:grid-cols-3">
      <div
        class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900"
      >
        <p class="text-xs tracking-wide text-gray-500 uppercase">Date</p>

        <p class="mt-2 text-sm font-medium text-gray-900 dark:text-gray-100">
          {{ event.eventDate | date: 'fullDate' }}
        </p>
      </div>

      <div
        class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900"
      >
        <p class="text-xs tracking-wide text-gray-500 uppercase">Location</p>

        <p class="mt-2 text-sm font-medium text-gray-900 dark:text-gray-100">
          {{ event.location }}
        </p>
      </div>

      <div
        class="rounded-2xl border border-gray-200 bg-white p-5 shadow-sm dark:border-gray-800 dark:bg-gray-900"
      >
        <p class="text-xs tracking-wide text-gray-500 uppercase">Organizer</p>

        <p class="mt-2 text-sm font-medium text-gray-900 dark:text-gray-100">
          {{ event.createdBy }}
        </p>
      </div>
    </div>
  }

  <button
    (click)="goBack()"
    class="inline-flex items-center gap-2 rounded-xl border border-gray-200 bg-white px-3 py-2 text-sm text-gray-600 shadow-sm transition-all duration-200 hover:bg-gray-100 hover:text-gray-900 active:scale-95 dark:border-gray-800 dark:bg-gray-900 dark:text-gray-300 dark:hover:bg-gray-800 dark:hover:text-gray-100"
  >
    <lucide-icon [img]="ArrowLeft" class="h-4 w-4"> </lucide-icon>
    Back
  </button>
</div>
<app-invite-user-modal
  [open]="inviteModalOpen()"
  (close)="inviteModalOpen.set(false)"
  (invite)="inviteUser($event)"
>
</app-invite-user-modal>
