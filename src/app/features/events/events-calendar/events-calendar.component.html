<div
  class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm dark:border-gray-800 dark:bg-gray-900"
>
  <div class="mb-6 flex items-center justify-between">
    <button
      (click)="previousMonth()"
      class="rounded-xl border border-gray-200 px-3 py-2 text-sm transition hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800"
    >
      ←
    </button>

    <h2 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
      {{ monthLabel() }}
    </h2>

    <button
      (click)="nextMonth()"
      class="rounded-xl border border-gray-200 px-3 py-2 text-sm transition hover:bg-gray-100 dark:border-gray-700 dark:hover:bg-gray-800"
    >
      →
    </button>
  </div>

  <div class="grid grid-cols-7 gap-2">
    @for (day of weekDays; track day) {
      <div class="pb-2 text-center text-xs font-semibold tracking-wide text-gray-500 uppercase">
        {{ day }}
      </div>
    }

    @for (day of calendarDays(); track day.date.toISOString()) {
      <div
        class="min-h-[110px] rounded-xl border border-gray-200 p-2 transition-all duration-200 hover:border-blue-300 hover:shadow-sm dark:border-gray-800 dark:hover:border-blue-800"
        [ngClass]="{
          'bg-gray-50 dark:bg-gray-950/50': !day.isCurrentMonth,
        }"
      >
        <div
          class="mb-2 text-xs font-medium"
          [ngClass]="{
            'text-gray-400': !day.isCurrentMonth,
            'text-gray-700 dark:text-gray-200': day.isCurrentMonth,
          }"
        >
          {{ day.date.getDate() }}
        </div>

        <div class="space-y-1">
          @for (event of day.events; track event.id) {
            <a
              [routerLink]="['/events', event.id]"
              class="block truncate rounded-md bg-blue-100 px-2 py-1 text-xs text-blue-700 transition hover:bg-blue-200 dark:bg-blue-900/30 dark:text-blue-300"
            >
              {{ event.title }}
            </a>
          }
        </div>
      </div>
    }
  </div>
</div>
