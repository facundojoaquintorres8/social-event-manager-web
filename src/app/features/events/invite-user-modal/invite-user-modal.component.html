<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4 backdrop-blur-sm"
  (click)="!loading() && onClose()"
>
  <div
    class="w-full max-w-md rounded-2xl border border-gray-200 bg-white p-6 shadow-2xl dark:border-gray-800 dark:bg-gray-900"
    (click)="stopPropagation($event)"
  >
    <div class="mb-5">
      <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Invite user</h2>

      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
        Invite someone to your event by email.
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <input
          type="email"
          formControlName="email"
          placeholder="john@email.com"
          class="w-full rounded-xl border border-gray-200 bg-white px-4 py-3 text-sm text-gray-900 shadow-sm transition-all duration-200 focus:ring-2 focus:ring-blue-500 focus:outline-none dark:border-gray-800 dark:bg-gray-950 dark:text-gray-100"
        />

        @if (form.controls.email.invalid && form.controls.email.touched) {
          <p class="mt-1 text-xs text-red-500">Enter a valid email</p>
        }
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button
          type="button"
          [disabled]="loading()"
          (click)="onClose()"
          class="rounded-xl border border-gray-200 px-4 py-2 text-sm font-medium text-gray-700 transition-all duration-200 hover:bg-gray-100 active:scale-95 dark:border-gray-800 dark:text-gray-300 dark:hover:bg-gray-800"
        >
          Cancel
        </button>

        <button
          type="submit"
          [disabled]="loading()"
          class="flex items-center justify-center rounded-xl bg-blue-600 px-4 py-2 text-sm font-medium text-white transition-all duration-200 hover:bg-blue-700 active:scale-95 disabled:opacity-50"
        >
          @if (loading()) {
            <span
              class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"
            ></span>
          } @else {
            Send invite
          }
        </button>
      </div>
    </form>
  </div>
</div>
