@if (loading()) {
  <div class="grid gap-4">
    @for (item of [1, 2, 3]; track item) {
      <div
        class="animate-pulse rounded-2xl border border-gray-200 bg-white p-5 dark:border-gray-800 dark:bg-gray-900"
      >
        <div class="space-y-3">
          <div class="h-5 w-1/3 rounded bg-gray-200 dark:bg-gray-700"></div>
          <div class="h-4 w-1/2 rounded bg-gray-200 dark:bg-gray-700"></div>
        </div>
      </div>
    }
  </div>
} @else if (events().length === 0) {
  <app-empty-state title="No attending events" description="Accepted invitations will appear here.">
    <lucide-icon icon [img]="Calendar" class="h-7 w-7 text-blue-600 dark:text-blue-400">
    </lucide-icon>
  </app-empty-state>
} @else {
  <div class="grid gap-4">
    @for (event of events(); track event.id) {
      <a
        [routerLink]="['/events', event.id]"
        class="group rounded-2xl border border-gray-200 bg-white p-5 shadow-sm transition-all duration-200 hover:-translate-y-0.5 hover:border-blue-200 hover:shadow-md dark:border-gray-800 dark:bg-gray-900 dark:hover:border-blue-800"
      >
        <div class="flex items-start justify-between gap-4">
          <div>
            <div class="flex items-center gap-2">
              <h3
                class="font-semibold text-gray-900 transition-colors group-hover:text-blue-600 dark:text-gray-100"
              >
                {{ event.title }}
              </h3>

              <span class="rounded-full bg-green-100 px-2 py-1 text-xs font-medium text-green-700">
                Attending
              </span>
            </div>

            <a
              [href]="buildGoogleMapsUrl(event.latitude, event.longitude)"
              target="_blank"
              rel="noopener noreferrer"
              (click)="$event.stopPropagation()"
              class="mt-2 inline-block text-sm text-blue-600 transition-colors hover:underline dark:text-blue-400"
            >
              {{ event.location }}
            </a>

            <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">
              {{ event.eventDate | date: 'medium' }}
            </p>

            <p class="mt-3 text-xs text-gray-400">Organized by {{ event.createdBy }}</p>
          </div>
        </div>
      </a>
    }
  </div>
}
