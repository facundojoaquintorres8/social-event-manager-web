<div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
  <div class="mb-4">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Invitations</h2>

    <p class="text-sm text-gray-500 dark:text-gray-400">
      Manage invitations received from other events.
    </p>
  </div>

  @if (error()) {
    <app-error-state
      title="Unable to load invitations"
      description="Something went wrong while loading your invitations."
      (retry)="loadInvitations()"
    />
  } @else if (loading()) {
    <app-event-card-skeleton variant="invitations" />
  } @else if (invitations().length === 0) {
    <app-empty-state
      title="No invitations yet"
      description="Invitations you receive will appear here."
    >
      <svg icon lucideInbox [size]="28" class="text-blue-600 dark:text-blue-400"></svg>
    </app-empty-state>
  } @else {
    <div class="grid gap-4">
      @for (invitation of invitations(); track invitation.invitationId) {
        <app-event-card
          [event]="toEventCard(invitation)"
          variant="invitations"
          [loadingAction]="
            actionLoading()?.invitationId === invitation.invitationId
              ? actionLoading()!.action
              : null
          "
          (acceptInvitation)="updateStatus($event, InvitationStatus.ACCEPTED)"
          (rejectInvitation)="updateStatus($event, InvitationStatus.REJECTED)"
        />
      }
    </div>
  }
</div>
