<div class="rounded-xl border border-gray-200 bg-white p-4 dark:border-gray-800 dark:bg-gray-900">
  <div class="mb-4">
    <h2 class="text-xl font-semibold text-gray-900 dark:text-gray-100">Attending</h2>

    <p class="text-sm text-gray-500 dark:text-gray-400">Events you've accepted invitations to.</p>
  </div>

  @if (error()) {
    <app-error-state
      title="Unable to load events"
      description="Something went wrong while loading your events."
      (retry)="loadEvents()"
    />
  } @else if (loading()) {
    <app-event-card-skeleton />
  } @else if (events().length === 0) {
    <app-empty-state
      title="No attending events"
      description="Accepted invitations will appear here."
    >
      <svg icon lucideCalendar [size]="28" class="text-blue-600 dark:text-blue-400"></svg>
    </app-empty-state>
  } @else {
    <div class="grid gap-4">
      @for (event of events(); track event.id) {
        <app-event-card [event]="toEventCard(event)" variant="attending" />
      }
    </div>
  }
</div>
