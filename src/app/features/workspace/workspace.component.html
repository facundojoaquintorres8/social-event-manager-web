<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 md:text-3xl dark:text-gray-100">
      {{ 'workspace.title' | translate }}
    </h1>

    <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
      {{ 'workspace.subtitle' | translate }}
    </p>
  </div>

  <div
    class="flex scrollbar-none gap-2 overflow-x-auto rounded-2xl border border-gray-200 bg-white p-2 shadow-sm dark:border-gray-800 dark:bg-gray-900"
  >
    <button
      (click)="setTab('created')"
      class="flex-shrink-0 rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'created',
        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'created',
      }"
    >
      {{ 'workspace.tabs.created' | translate }}
    </button>

    <button
      (click)="setTab('attending')"
      class="flex-shrink-0 rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'attending',
        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'attending',
      }"
    >
      {{ 'workspace.tabs.attending' | translate }}
    </button>

    <button
      (click)="setTab('invitations')"
      class="flex-shrink-0 rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'invitations',
        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'invitations',
      }"
    >
      {{ 'workspace.tabs.invitations' | translate }}
    </button>

    <button
      (click)="setTab('calendar')"
      class="flex-shrink-0 rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'calendar',
        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'calendar',
      }"
    >
      {{ 'workspace.tabs.calendar' | translate }}
    </button>
  </div>

  @if (activeTab() === 'created') {
    <app-created-events />
  } @else if (activeTab() === 'invitations') {
    <app-invitations />
  } @else if (activeTab() === 'calendar') {
    <app-events-calendar />
  } @else {
    <app-attending-events />
  }
</div>
