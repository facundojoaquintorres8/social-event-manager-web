<div class="space-y-6">
  <div>
    <h1 class="text-2xl font-bold text-gray-900 md:text-3xl dark:text-gray-100">Workspace</h1>

    <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
      Manage your events, invitations and attendance.
    </p>
  </div>

  <div
    class="flex flex-wrap gap-2 rounded-2xl border border-gray-200 bg-white p-2 shadow-sm dark:border-gray-800 dark:bg-gray-900"
  >
    <button
      (click)="activeTab.set('created')"
      class="rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'created',

        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'created',
      }"
    >
      Created
    </button>

    <button
      (click)="activeTab.set('attending')"
      class="rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'attending',

        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'attending',
      }"
    >
      Attending
    </button>

    <button
      (click)="activeTab.set('invitations')"
      class="rounded-xl px-4 py-2 text-sm font-medium transition-all duration-200"
      [ngClass]="{
        'bg-blue-600 text-white shadow-sm': activeTab() === 'invitations',

        'text-gray-600 hover:bg-gray-100 dark:text-gray-300 dark:hover:bg-gray-800':
          activeTab() !== 'invitations',
      }"
    >
      Invitations
    </button>
  </div>

  @if (activeTab() === 'created') {
    <app-events />
  } @else if (activeTab() === 'invitations') {
    <app-invitations />
  } @else {
    <div
      class="rounded-2xl border border-dashed border-gray-300 bg-white p-10 text-center dark:border-gray-700 dark:bg-gray-900"
    >
      <h3 class="text-lg font-semibold text-gray-900 dark:text-gray-100">
        Attending events coming next
      </h3>

      <p class="mt-2 text-sm text-gray-500 dark:text-gray-400">
        We'll connect your attending events here.
      </p>
    </div>
  }
</div>
