<div class="min-h-screen bg-gray-50 transition-colors duration-300 dark:bg-gray-950">
  @if (toastService.toast()) {
    <div
      class="animate-in fade-in slide-in-from-top-2 fixed top-4 right-4 rounded-lg px-4 py-2 text-sm shadow-lg transition-all duration-300"
      [ngClass]="{
        'bg-green-100 text-green-700 dark:bg-green-900/40 dark:text-green-300':
          toastService.toast()?.type === 'success',
        'bg-red-100 text-red-700 dark:bg-red-900/40 dark:text-red-300':
          toastService.toast()?.type === 'error',
      }"
    >
      {{ toastService.toast()?.message }}
    </div>
  }

  <div class="fixed top-3 left-3 z-50">
    <button
      (click)="themeService.toggleTheme()"
      class="flex h-10 w-10 items-center justify-center rounded-xl border border-gray-200 bg-white shadow-sm transition-all duration-200 hover:bg-gray-100 active:scale-95 dark:border-gray-800 dark:bg-gray-900 dark:hover:bg-gray-800"
    >
      <lucide-icon
        [img]="themeService.darkMode() ? Sun : Moon"
        class="h-5 w-5 text-gray-700 dark:text-gray-200"
      >
      </lucide-icon>
    </button>
  </div>

  <router-outlet></router-outlet>
</div>
